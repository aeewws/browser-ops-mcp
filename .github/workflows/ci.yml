name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm install
      - run: npx playwright install --with-deps chromium
      - run: npm run typecheck
      - run: npm run build
      - run: chmod +x dist/cli/index.js && ./dist/cli/index.js --help
      - run: node tests/pack-smoke.mjs
      - run: node tests/mcp-smoke.mjs
      - run: npm test
