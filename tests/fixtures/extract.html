<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Browser Ops Extract Fixture</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 2rem;
        max-width: 48rem;
      }
      form {
        display: grid;
        gap: 0.75rem;
        max-width: 24rem;
      }
    </style>
  </head>
  <body>
    <h1>Browser Ops Extract Fixture</h1>
    <p>Paragraph alpha for markdown extraction.</p>
    <ul>
      <li>First item</li>
      <li>Second item</li>
    </ul>
    <p>
      <a href="https://example.com/docs">Docs</a>
      <a href="https://example.com/help">Help</a>
    </p>
    <form id="fixture-form">
      <label for="name">Name</label>
      <input id="name" name="name" placeholder="Type your name">
      <label for="topic">Topic</label>
      <select id="topic" name="topic">
        <option value="browser">Browser</option>
        <option value="doc">Doc</option>
      </select>
      <button type="submit">Submit</button>
    </form>
    <p id="result">Waiting</p>
    <script>
      document.getElementById("fixture-form").addEventListener("submit", function (event) {
        event.preventDefault();
        const name = document.getElementById("name").value;
        const topic = document.getElementById("topic").value;
        document.getElementById("result").textContent = `Saved ${name} about ${topic}`;
      });
    </script>
  </body>
</html>
